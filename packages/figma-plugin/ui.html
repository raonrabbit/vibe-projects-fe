<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                font-family: "Inter", -apple-system, sans-serif;
                font-size: 12px;
                background: #1e1e1e;
                color: #e0e0e0;
                padding: 14px;
            }
            .header {
                display: flex;
                align-items: center;
                gap: 6px;
                font-size: 12px;
                font-weight: 600;
                color: #fff;
                margin-bottom: 12px;
            }
            .dot {
                width: 7px;
                height: 7px;
                border-radius: 50%;
                background: #18a0fb;
                flex-shrink: 0;
            }
            .btn {
                display: block;
                width: 100%;
                padding: 7px 10px;
                background: #18a0fb;
                color: #fff;
                border: none;
                border-radius: 6px;
                font-size: 11px;
                font-weight: 500;
                cursor: pointer;
                transition: background 0.15s;
            }
            .btn:hover:not(:disabled) {
                background: #0c8ce9;
            }
            .btn:disabled {
                opacity: 0.45;
                cursor: default;
            }
            .btn-ghost {
                background: transparent;
                border: 1px solid #3a3a3a;
                color: #ccc;
            }
            .btn-ghost:hover:not(:disabled) {
                background: #2a2a2a;
            }
            .btn-row {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 6px;
                margin-bottom: 6px;
            }
            .note {
                font-size: 10px;
                color: #555;
            }
            .divider {
                border: none;
                border-top: 1px solid #2e2e2e;
                margin: 10px 0;
            }
            .section-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 7px;
            }
            .section-title {
                font-size: 10px;
                font-weight: 600;
                color: #888;
                text-transform: uppercase;
                letter-spacing: 0.06em;
            }
            .toggle-row {
                display: flex;
                align-items: center;
                gap: 4px;
            }
            .btn-text {
                background: none;
                border: none;
                color: #18a0fb;
                font-size: 10px;
                cursor: pointer;
                padding: 0;
                line-height: 1;
            }
            .btn-text:hover {
                text-decoration: underline;
            }
            .sep {
                color: #444;
                font-size: 10px;
                line-height: 1;
            }
            .checkbox-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 2px 6px;
                margin-bottom: 10px;
            }
            .checkbox-grid label {
                display: flex;
                align-items: center;
                gap: 5px;
                cursor: pointer;
                color: #c8c8c8;
                font-size: 11px;
                padding: 3px 5px;
                border-radius: 4px;
                user-select: none;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .checkbox-grid label:hover {
                background: #272727;
            }
            .checkbox-grid input[type="checkbox"] {
                accent-color: #18a0fb;
                width: 12px;
                height: 12px;
                flex-shrink: 0;
                cursor: pointer;
            }
            .status {
                background: #252525;
                border: 1px solid #2e2e2e;
                border-radius: 5px;
                padding: 7px 9px;
                font-size: 11px;
                color: #888;
                margin-top: 10px;
                min-height: 28px;
                line-height: 1.4;
            }
            .status.success {
                color: #4ade80;
                border-color: #1a3a2a;
            }
            .status.error {
                color: #f87171;
                border-color: #3a1a1a;
            }
            .status.working {
                color: #60a5fa;
            }
        </style>
    </head>
    <body>
        <div class="header">
            <span class="dot"></span>vibe-projects Design System
        </div>

        <div class="btn-row">
            <button class="btn" id="importBtn">Import Tokens</button>
            <button class="btn btn-ghost" id="showcaseBtn">Token Showcase</button>
        </div>
        <p class="note">※ Variables 생성은 Figma Professional 이상 필요</p>

        <hr class="divider" />

        <div class="section-header">
            <span class="section-title">Components</span>
            <span class="toggle-row">
                <button class="btn-text" id="selectAllBtn">All</button>
                <span class="sep">·</span>
                <button class="btn-text" id="selectNoneBtn">None</button>
            </span>
        </div>

        <div class="checkbox-grid">
            <label><input type="checkbox" id="cbButton" checked /> Button</label>
            <label><input type="checkbox" id="cbBadge" checked /> Badge</label>
            <label><input type="checkbox" id="cbCard" checked /> Card</label>
            <label><input type="checkbox" id="cbInput" checked /> Input</label>
            <label><input type="checkbox" id="cbList" checked /> List</label>
            <label><input type="checkbox" id="cbDivider" checked /> Divider</label>
            <label><input type="checkbox" id="cbSpinner" checked /> Spinner</label>
            <label><input type="checkbox" id="cbIcon" checked /> Icon</label>
            <label><input type="checkbox" id="cbSkeleton" checked /> Skeleton</label>
            <label><input type="checkbox" id="cbCheckbox" checked /> Checkbox</label>
            <label><input type="checkbox" id="cbTab" checked /> Tab</label>
            <label><input type="checkbox" id="cbSegmentedControl" checked /> SegmentedControl</label>
            <label><input type="checkbox" id="cbTable" checked /> Table</label>
            <label><input type="checkbox" id="cbModal" checked /> Modal</label>
            <label><input type="checkbox" id="cbToast" checked /> Toast</label>
        </div>

        <button class="btn" id="generateBtn">Generate Components</button>

        <div class="status" id="status">Ready</div>

        <script>
            const statusEl = document.getElementById("status");
            const importBtn = document.getElementById("importBtn");
            const showcaseBtn = document.getElementById("showcaseBtn");
            const generateBtn = document.getElementById("generateBtn");
            const allBtns = [importBtn, showcaseBtn, generateBtn];

            const cbIds = [
                "cbButton", "cbBadge", "cbCard", "cbInput", "cbList",
                "cbDivider", "cbSpinner", "cbIcon", "cbSkeleton", "cbCheckbox",
                "cbTab", "cbSegmentedControl", "cbTable", "cbModal", "cbToast",
            ];

            document.getElementById("selectAllBtn").addEventListener("click", () => {
                cbIds.forEach((id) => (document.getElementById(id).checked = true));
            });
            document.getElementById("selectNoneBtn").addEventListener("click", () => {
                cbIds.forEach((id) => (document.getElementById(id).checked = false));
            });

            function setStatus(msg, cls = "") {
                statusEl.textContent = msg;
                statusEl.className = "status " + cls;
            }
            function setBusy(busy) {
                allBtns.forEach((b) => (b.disabled = busy));
            }

            importBtn.addEventListener("click", () => {
                setStatus("Importing tokens...", "working");
                setBusy(true);
                parent.postMessage({ pluginMessage: { type: "import-tokens" } }, "*");
            });

            showcaseBtn.addEventListener("click", () => {
                setStatus("Generating token showcase...", "working");
                setBusy(true);
                parent.postMessage({ pluginMessage: { type: "generate-showcase" } }, "*");
            });

            generateBtn.addEventListener("click", () => {
                const map = {
                    cbButton: "Button", cbBadge: "Badge", cbCard: "Card",
                    cbInput: "Input", cbList: "List", cbDivider: "Divider",
                    cbSpinner: "Spinner", cbIcon: "Icon", cbSkeleton: "Skeleton",
                    cbCheckbox: "Checkbox", cbTab: "Tab",
                    cbSegmentedControl: "SegmentedControl", cbTable: "Table",
                    cbModal: "Modal", cbToast: "Toast",
                };
                const components = cbIds
                    .filter((id) => document.getElementById(id).checked)
                    .map((id) => map[id]);
                if (!components.length) {
                    setStatus("컴포넌트를 하나 이상 선택하세요", "error");
                    return;
                }
                setStatus("Generating...", "working");
                setBusy(true);
                parent.postMessage(
                    { pluginMessage: { type: "generate-components", components } },
                    "*",
                );
            });

            window.addEventListener("message", (e) => {
                const msg = e.data.pluginMessage;
                if (!msg) return;
                if (msg.type === "progress") {
                    setStatus(msg.message, "working");
                    return;
                }
                setBusy(false);
                if (msg.type === "success") setStatus(msg.message, "success");
                if (msg.type === "error") setStatus(msg.message, "error");
            });
        </script>
    </body>
</html>
