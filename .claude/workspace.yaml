# .claude/workspace.yaml
# Single Source of Truth for monorepo package metadata.
# Edit this file to update CODEOWNERS and ship skill scopes automatically.
# DO NOT edit .github/CODEOWNERS or ship/SKILL.md scopes table directly — they are generated.

meta:
  repo: raonrabbit/vibe-projects-fe
  default_owner: "@raonrabbit"

packages:
  - path: packages/tsconfig
    name: "@vibe/tsconfig"
    scope: tsconfig
    owner: "@raonrabbit"

  - path: packages/eslint-config
    name: "@vibe/eslint-config"
    scope: eslint-config
    owner: "@raonrabbit"

  - path: packages/figma-plugin
    name: "@vibe/figma-plugin"
    scope: figma-plugin
    owner: "@raonrabbit"

apps:
  - path: apps/dev-news
    name: "@vibe/dev-news"
    scope: dev-news
    owner: "@raonrabbit"

  - path: apps/mercari-kor
    name: "@vibe/mercari-kor"
    scope: mercari-kor
    owner: "@raonrabbit"

  - path: apps/my-page
    name: "@vibe/my-page"
    scope: my-page
    owner: "@raonrabbit"

  - path: apps/flightrail
    name: "@vibe/flightrail"
    scope: flightrail
    owner: "@raonrabbit"
